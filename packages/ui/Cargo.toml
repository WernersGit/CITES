[package]
name = "ui"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["router"] }
api = { version = "0.1.0", path = "../api" }
core_logic = { version = "0.1.0", path = "../core" }
async-std = "1.13.2"
futures = "0.3"
platform = { version = "0.1.0", path = "../platform" }
chrono = "0.4.44"
serde_json = "1"
base64 = "0.22"

# rfd has no backend implementation on iOS/Android.
[target.'cfg(not(any(target_os = "ios", target_os = "android")))'.dependencies]
rfd = "0.14"

[features]
server = ["api/server"]
