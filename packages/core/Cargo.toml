[package]
name = "core_logic"
version = "0.1.0"
edition = "2021"

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
itertools = "0.13"
pcap-file = "2.0"
serde_json = "1.0.149"
radiotap = "1.3.0"
etherparse = "0.19.0"
bitvec = { version = "1.0.1", features = ["serde"] }
tracing = "0.1"

[build-dependencies]
cc = "1.0"
bindgen = "0.69.4"
